apiVersion: apps/v1
kind: Deployment
metadata:
  name: justdefenders-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: justdefenders
  template:
    metadata:
      labels:
        app: justdefenders
    spec:
      containers:
        - name: justdefenders
          image: justdefenders:latest
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: justdefenders-service
spec:
  type: LoadBalancer
  selector:
    app: justdefenders
  ports:
    - port: 80
      targetPort: 3000